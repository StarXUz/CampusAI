spring.application.name=campus-service-manager-ai
server.port=8091
spring.main.banner-mode=console
spring.freemarker.charset=UTF-8
spring.freemarker.suffix=.ftl
spring.freemarker.check-template-location=false
spring.web.resources.static-locations=classpath:/static/
app.upload.dir=${user.dir}/runtime-uploads

app.startup.open-browser=false
app.startup.host=127.0.0.1
app.startup.admin-host=127.0.0.1
app.startup.client-host=localhost
app.startup.super-host=super.localhost
app.startup.admin-port=${server.port}
app.startup.client-port=8092
app.startup.super-port=8093

app.server.multi-port.enabled=true
app.server.client-port=8092
app.server.super-port=8093

db.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/campus_service_manager_ai?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
db.username=${DB_USERNAME:root}
db.password=${DB_PASSWORD:123456}
db.driver-class-name=com.mysql.cj.jdbc.Driver

redis.host=127.0.0.1
redis.port=6379
redis.database=0

zookeeper.enabled=false
zookeeper.connect-string=127.0.0.1:2181

app.ai.enabled=true
app.ai.provider=qwen-compatible
app.ai.api-key=${QWEN_API_KEY:${DASHSCOPE_API_KEY:}}
app.ai.api-url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
app.ai.model=qwen-plus
app.ai.system-prompt=你是智慧校园生活服务平台的AI助手，回答要简洁实用。
